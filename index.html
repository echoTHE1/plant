<!DOCTYPE html>
<html>
<head>
  <title>File Share</title>
</head>
<body>

<h1>Upload and Share Files</h1>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<p id="status"></p>

<h2>Files</h2>
<ul id="files">Loading...</ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://gffrpswptuhgdchjsbet.supabase.co";
const supabaseKey = "sb_publishable_BVZyr1BwT_GupG1DGCxIgg_V4dpnrbY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  const status = document.getElementById("status");

  if (!file) {
    alert("Pick a file first");
    return;
  }

  status.innerText = "Uploading...";

  const fileName = Date.now() + "-" + file.name;

  const { error } = await supabase.storage
    .from("uploads")
    .upload(fileName, file);

  if (error) {
    status.innerText = "Error: " + error.message;
    return;
  }

  status.innerText = "Upload complete!";
  loadFiles(); // refresh list
}

async function loadFiles() {
  const list = document.getElementById("files");

  const { data, error } = await supabase.storage
    .from("uploads")
    .list();

  if (error) {
    list.innerHTML = "<li>Error loading files</li>";
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "<li>No files found</li>";
    return;
  }

  list.innerHTML = "";

  data.forEach(file => {
    const { data: urlData } = supabase.storage
      .from("uploads")
      .getPublicUrl(file.name);

    const li = document.createElement("li");
    li.innerHTML = `<a href="${urlData.publicUrl}" target="_blank">${file.name}</a>`;
    list.appendChild(li);
  });
}

loadFiles();
</script>

</body>
</html>
