<!DOCTYPE html>
<html>
<head>
  <title>Files</title>
</head>
<body>

<h2>Files</h2>
<ul id="files"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://gffrpswptuhgdchjsbet.supabase.co";
const supabaseKey = "sb_publishable_BVZyr1BwT_GupG1DGCxIgg_V4dpnrbY";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function loadFiles() {
  const list = document.getElementById("files");

  const { data, error } = await supabase.storage
    .from("uploads")
    .list();

  if (error) {
    list.innerHTML = "<li>Error loading files</li>";
    console.error(error);
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "<li>No files uploaded yet</li>";
    return;
  }

  data.forEach(file => {
    const { data: urlData } = supabase.storage
      .from("uploads")
      .getPublicUrl(file.name);

    const li = document.createElement("li");
    li.innerHTML = `<a href="${urlData.publicUrl}" target="_blank">${file.name}</a>`;
    list.appendChild(li);
  });
}

loadFiles();
</script>

</body>
</html>
