<!DOCTYPE html>
<html>
<head>
    <title>Upload and Share Files</title>
</head>
<body>

<h1>Upload and Share Files</h1>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<h2>Files:</h2>
<ul id="fileList"></ul>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  const ref = storage.ref("uploads/" + file.name);

  ref.put(file).then(() => {
    alert("Uploaded!");
    loadFiles();
  });
}

function loadFiles() {
  const list = document.getElementById("fileList");
  list.innerHTML = "";

  storage.ref("uploads").listAll().then(res => {
    res.items.forEach(item => {
      item.getDownloadURL().then(url => {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${url}" target="_blank">${item.name}</a>`;
        list.appendChild(li);
      });
    });
  });
}

loadFiles();
</script>

</body>
</html>
