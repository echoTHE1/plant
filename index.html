<!DOCTYPE html>
<html>
<head>
  <title>Files</title>
</head>
<body>

<h2>Files</h2>
<ul id="files">STARTING...</ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.getElementById("files").innerHTML = "Script loaded...";

window.onload = async function () {
  const list = document.getElementById("files");

  if (!window.supabase) {
    list.innerHTML = "❌ Supabase NOT loaded";
    return;
  }

  list.innerHTML = "✅ Supabase loaded";

  const client = window.supabase.createClient(
    "https://gffrpswptuhgdchjsbet.supabase.co",
    "sb_publishable_BVZyr1BwT_GupG1DGCxIgg_V4dpnrbY"
  );

  list.innerHTML = "⏳ Loading files...";

  const { data, error } = await client.storage
    .from("uploads")
    .list();

  if (error) {
    list.innerHTML = "❌ ERROR: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "⚠️ No files in bucket";
    return;
  }

  list.innerHTML = "";

  data.forEach(file => {
    const { data: urlData } = client.storage
      .from("uploads")
      .getPublicUrl(file.name);

    const li = document.createElement("li");
    li.innerHTML = `<a href="${urlData.publicUrl}" target="_blank">${file.name}</a>`;
    list.appendChild(li);
  });
};
</script>

</body>
</html>
