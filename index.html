<h2>Files</h2>
<ul id="files"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://gffrpswptuhgdchjsbet.supabase.co";
const supabaseKey = "sb_publishable_BVZyr1BwT_GupG1DGCxIgg_V4dpnrbY";

const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);

async function loadFiles() {
  const { data, error } = await supabase.storage.from("uploads").list();

  const list = document.getElementById("files");
  list.innerHTML = "";

  data.forEach(file => {
    const url = supabase.storage.from("uploads").getPublicUrl(file.name).data.publicUrl;

    const li = document.createElement("li");
    li.innerHTML = `<a href="${url}" target="_blank">${file.name}</a>`;
    list.appendChild(li);
  });
}

loadFiles();
</script>
