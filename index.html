<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>share.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px;
    }

    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes grow    { from { opacity:0; transform:scale(0.97); }      to { opacity:1; transform:scale(1); } }
    @keyframes spin    { to   { transform: rotate(360deg); } }

    #wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* ── header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.4s ease both;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }
    header h1 span { color: #C8A96A; }
    header p { font-size: 12px; color: #888; letter-spacing: 0.08em; }

    /* ── card ── */
    #card {
      background: #fff;
      border: 1px solid #E0DAD0;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
      animation: grow 0.3s ease both;
    }

    /* ── tabs ── */
    #tabs {
      display: flex;
      border-bottom: 1px solid #E0DAD0;
    }
    .tab {
      flex: 1;
      padding: 14px 0;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      color: #aaa;
      transition: color 0.15s;
    }
    .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
    .tab:hover  { opacity: 0.7; }

    /* ── panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* file drop zone */
    #drop-zone {
      padding: 64px 32px;
      text-align: center;
      cursor: pointer;
    }
    #drop-zone:hover .drop-arrow { opacity: 0.5; }
    .drop-arrow { font-size: 40px; margin-bottom: 20px; opacity: 0.2; transition: opacity 0.2s; display: block; }
    #drop-zone h2 { font-size: 14px; color: #1a1a1a; margin-bottom: 6px; font-weight: 500; font-family: 'DM Mono', monospace; }
    #drop-zone p  { font-size: 11px; color: #aaa; letter-spacing: 0.06em; }

    /* url panel */
    #url-panel { padding: 32px 28px; }
    #url-panel textarea {
      width: 100%; resize: none;
      border: 1px solid #E0DAD0; padding: 14px 16px;
      font-family: 'DM Mono', monospace; font-size: 13px;
      color: #1a1a1a; background: #FAF8F4; line-height: 1.6;
    }
    #url-panel textarea:focus { outline: none; border-color: #aaa; }

    /* ── uploading ── */
    #uploading-panel { padding: 64px 32px; text-align: center; }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid #E0DAD0;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 24px;
    }
    #uploading-panel p { font-size: 13px; color: #1a1a1a; margin-bottom: 20px; font-weight: 500; }
    #progress-track { background: #F0EDE6; height: 2px; width: 100%; }
    #progress-bar   { height: 100%; background: #1a1a1a; width: 0%; transition: width 0.3s ease; }
    #progress-pct   { margin-top: 10px; font-size: 11px; color: #aaa; }

    /* ── done ── */
    #done-panel { padding: 40px 28px; animation: fadeUp 0.25s ease both; }
    #done-panel .check { font-size: 28px; text-align: center; margin-bottom: 10px; }
    #done-panel h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: #1a1a1a; text-align: center; margin-bottom: 4px;
    }
    #done-panel .sub { font-size: 11px; color: #aaa; letter-spacing: 0.06em; text-align: center; margin-bottom: 28px; }
    #result-box {
      background: #FAF8F4; border: 1px solid #E0DAD0;
      padding: 14px 16px; margin-bottom: 12px;
      word-break: break-all; font-size: 13px; color: #555; line-height: 1.6;
      user-select: all;
    }
    .center { text-align: center; }

    /* ── error ── */
    #error-panel { padding: 48px 28px; text-align: center; animation: fadeUp 0.2s ease both; }
    #error-panel .x  { font-size: 28px; margin-bottom: 14px; }
    #error-panel h2  { font-size: 14px; color: #1a1a1a; margin-bottom: 8px; font-weight: 500; font-family: 'DM Mono', monospace; }
    #error-panel p   { font-size: 12px; color: #aaa; margin-bottom: 28px; line-height: 1.6; }

    /* ── shared button styles ── */
    .btn-main {
      width: 100%; background: #1a1a1a; color: #fff;
      border: none; padding: 14px 0;
      font-family: 'DM Mono', monospace; font-size: 12px;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
      margin-top: 12px;
    }
    .btn-main:hover   { background: #333; }
    .btn-main:disabled { background: #ccc; cursor: default; }
    .btn-main.green   { background: #2E7D32; }
    .btn-small {
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: #aaa; letter-spacing: 0.08em;
      font-family: 'DM Mono', monospace; margin-top: 12px;
    }
    .btn-small:hover { text-decoration: underline; }
    .btn-inline {
      background: #1a1a1a; color: #fff; border: none;
      padding: 12px 32px; font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-inline:hover { background: #333; }

    /* ── footer ── */
    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 10px;
      color: #bbb;
      letter-spacing: 0.08em;
    }

    /* ── drag overlay ── */
    #drag-overlay {
      position: fixed; inset: 0;
      background: rgba(30,30,30,0.92);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeUp 0.15s ease;
    }
    #drag-overlay.visible { display: flex; }
    #drag-overlay .big-arrow { font-size: 56px; margin-bottom: 20px; color: #F5F0E8; }
    #drag-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: 32px; color: #F5F0E8; letter-spacing: -0.02em;
    }
  </style>
</head>
<body>

<!-- Drag overlay -->
<div id="drag-overlay">
  <div style="text-align:center">
    <div class="big-arrow">↓</div>
    <h2>Drop to share</h2>
  </div>
</div>

<div id="wrap">

  <header>
    <h1>share<span>.</span></h1>
    <p>drop a file or paste a link</p>
  </header>

  <div id="card">

    <!-- IDLE STATE -->
    <div id="idle-state">
      <div id="tabs">
        <button class="tab active" data-tab="file">File</button>
        <button class="tab"        data-tab="url">URL</button>
      </div>

      <div id="panel-file" class="panel active">
        <div id="drop-zone">
          <span class="drop-arrow">↑</span>
          <h2>Click or drag a file here</h2>
          <p>up to 512MB &nbsp;·&nbsp; permanent link</p>
        </div>
        <input type="file" id="file-input" style="display:none" />
      </div>

      <div id="panel-url" class="panel">
        <div id="url-panel">
          <textarea id="url-input" rows="3" placeholder="https://example.com/your-link"></textarea>
          <button class="btn-main" id="url-submit" disabled>Get share link</button>
        </div>
      </div>
    </div>

    <!-- UPLOADING STATE -->
    <div id="uploading-state" style="display:none">
      <div id="uploading-panel">
        <div class="spinner"></div>
        <p id="uploading-name">Uploading…</p>
        <div id="progress-track"><div id="progress-bar"></div></div>
        <div id="progress-pct">0%</div>
      </div>
    </div>

    <!-- DONE STATE -->
    <div id="done-state" style="display:none">
      <div id="done-panel">
        <div class="check">✓</div>
        <h2 id="done-title">File uploaded</h2>
        <div class="sub" id="done-sub">Link works for 72 hours</div>
        <div id="result-box"></div>
        <button class="btn-main" id="copy-btn">Copy link</button>
        <div class="center">
          <button class="btn-small" id="reset-btn">Share another</button>
        </div>
      </div>
    </div>

    <!-- ERROR STATE -->
    <div id="error-state" style="display:none">
      <div id="error-panel">
        <div class="x">×</div>
        <h2>Something went wrong</h2>
        <p id="error-msg">Upload failed. Try again.</p>
        <button class="btn-inline" id="error-reset-btn">Try again</button>
      </div>
    </div>

  </div><!-- /card -->

  <footer>Files hosted by 0x0.st &nbsp;·&nbsp; up to 512MB &nbsp;·&nbsp; permanent</footer>

</div><!-- /wrap -->

<script>
  // ── Elements ──────────────────────────────────────────────
  const $idle      = document.getElementById('idle-state');
  const $uploading = document.getElementById('uploading-state');
  const $done      = document.getElementById('done-state');
  const $error     = document.getElementById('error-state');
  const $fileInput = document.getElementById('file-input');
  const $dropZone  = document.getElementById('drop-zone');
  const $urlInput  = document.getElementById('url-input');
  const $urlSubmit = document.getElementById('url-submit');
  const $copyBtn   = document.getElementById('copy-btn');
  const $resultBox = document.getElementById('result-box');
  const $progressBar = document.getElementById('progress-bar');
  const $progressPct = document.getElementById('progress-pct');
  const $uploadingName = document.getElementById('uploading-name');
  const $doneTitle = document.getElementById('done-title');
  const $doneSub   = document.getElementById('done-sub');
  const $errorMsg  = document.getElementById('error-msg');
  const $dragOverlay = document.getElementById('drag-overlay');
  const tabs       = document.querySelectorAll('.tab');
  const panels     = document.querySelectorAll('.panel');

  let currentResult = '';
  let progressInterval = null;
  let dragCounter = 0;

  // ── Tab switching ─────────────────────────────────────────
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Show/hide states ──────────────────────────────────────
  function showState(name) {
    $idle.style.display      = name === 'idle'      ? 'block' : 'none';
    $uploading.style.display = name === 'uploading' ? 'block' : 'none';
    $done.style.display      = name === 'done'      ? 'block' : 'none';
    $error.style.display     = name === 'error'     ? 'block' : 'none';
  }

  function reset() {
    showState('idle');
    $urlInput.value = '';
    $urlSubmit.disabled = true;
    $copyBtn.textContent = 'Copy link';
    $copyBtn.classList.remove('green');
    currentResult = '';
    setProgress(0);
    $fileInput.value = '';
  }

  function setProgress(pct) {
    $progressBar.style.width = pct + '%';
    $progressPct.textContent = Math.round(pct) + '%';
  }

  // ── File upload ───────────────────────────────────────────
  async function uploadFile(file) {
    if (file.size > 512 * 1024 * 1024) {
      showError('File must be under 512MB.');
      return;
    }

    showState('uploading');
    $uploadingName.textContent = 'Uploading "' + file.name + '"…';
    setProgress(0);

    let progress = 0;
    progressInterval = setInterval(() => {
      progress = Math.min(progress + Math.random() * 15, 88);
      setProgress(progress);
    }, 200);

    try {
      const form = new FormData();
      form.append('file', file);

      const res = await fetch('https://0x0.st', {
        method: 'POST',
        body: form,
      });

      clearInterval(progressInterval);
      setProgress(100);

      const text = await res.text();
      const url = text.trim();
      if (url.startsWith('https://') || url.startsWith('http://')) {
        showDone(url, false);
      } else {
        throw new Error('Unexpected response');
      }
    } catch (err) {
      clearInterval(progressInterval);
      showError('Upload failed. Check your connection and try again.');
    }
  }

  function showDone(url, isUrl) {
    currentResult = url;
    $resultBox.textContent = url;
    $doneTitle.textContent = isUrl ? 'Link ready' : 'File uploaded';
    $doneSub.textContent   = isUrl ? 'Share this link' : 'Permanent link — share with anyone';
    showState('done');
  }

  function showError(msg) {
    $errorMsg.textContent = msg;
    showState('error');
  }

  // ── URL submit ────────────────────────────────────────────
  $urlInput.addEventListener('input', () => {
    $urlSubmit.disabled = !$urlInput.value.trim();
  });

  $urlInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitUrl();
    }
  });

  $urlSubmit.addEventListener('click', submitUrl);

  function submitUrl() {
    let url = $urlInput.value.trim();
    if (!url) return;
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
    showDone(url, true);
  }

  // ── Copy ──────────────────────────────────────────────────
  $copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(currentResult).catch(() => {});
    $copyBtn.textContent = '✓  Copied!';
    $copyBtn.classList.add('green');
    setTimeout(() => {
      $copyBtn.textContent = 'Copy link';
      $copyBtn.classList.remove('green');
    }, 2000);
  });

  // ── Reset buttons ─────────────────────────────────────────
  document.getElementById('reset-btn').addEventListener('click', reset);
  document.getElementById('error-reset-btn').addEventListener('click', reset);

  // ── Click to upload ───────────────────────────────────────
  $dropZone.addEventListener('click', () => $fileInput.click());
  $fileInput.addEventListener('change', () => {
    if ($fileInput.files[0]) uploadFile($fileInput.files[0]);
  });

  // ── Drag & drop ───────────────────────────────────────────
  document.addEventListener('dragenter', e => {
    e.preventDefault();
    dragCounter++;
    $dragOverlay.classList.add('visible');
  });

  document.addEventListener('dragleave', e => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) $dragOverlay.classList.remove('visible');
  });

  document.addEventListener('dragover', e => e.preventDefault());

  document.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    $dragOverlay.classList.remove('visible');
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  });
</script>
</body>
</html>
